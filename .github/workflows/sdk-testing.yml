name: SDK Test Automation

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  test-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-java'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-java/blob/master/.github/workflows/gradle.yml
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate code
        run: python3 generate-code.py

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: java
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Java SDK test
        run: ./gradlew build

  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-python'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-python/blob/master/.github/workflows/auto-testing.yml
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      - name: Generate code
        run: python3 generate-code.py

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test with pytest
        run: tox

  test-php:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-php'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-php/blob/master/.github/workflows/php-checks.yml
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.2'

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate code
        run: python generate-code.py

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies with Composer
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: php
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: ./vendor/bin/phpunit --test-suffix=Test.php

  test-nodejs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-nodejs'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-nodejs/blob/master/.github/workflows/test.yml
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 17
          architecture: x64

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Dependency
        run: npm ci

      - name: Generate code
        run: python3 generate-code.py

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: nodejs
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Project
        run: export NODE_OPTIONS=--max-old-space-size=6144; npm test

  test-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-go'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-go/blob/master/.github/workflows/go.yml
      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 17
          architecture: x64

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Generate code
        run: python generate-code.py

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: go
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: run tests
        run: go test ./...

      - name: go vet
        run: go vet $(go list ./... | grep -v /examples/)

      - name: Compile example scripts
        run: |
          for file in $(find ./examples/ -name '*.go'); do
            dir=$(dirname $file)
            pushd $dir
            go build -o /dev/null
            popd
          done

  test-ruby:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'line/line-bot-sdk-ruby'
          submodules: recursive

      - name: Update line-openapi submodule
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: './line-openapi'

      # https://github.com/line/line-bot-sdk-ruby/blob/master/.github/workflows/pull_request.yml
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: 3.4
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: 17
          architecture: x64
      - run: bundle install

      - name: Generate code
        run: python3 generate-code.py

      - name: Show diff
        run: |
          git add .
          git diff --color=always --staged

      - name: Post PR comment
        if : ${{ github.event_name == 'pull_request' }}
        uses: ./line-openapi/.github/actions/post-comment-action
        with:
          language: ruby
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: bundle exec rake ci
